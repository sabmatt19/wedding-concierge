<!DOCTYPE html>
<html>
<head>
<title>Sabrina & Matthew | Wedding Concierge</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link 
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;500&display=swap" 
rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #e6f3fb, #d6ecf7);
  overflow: hidden;
}

.wave {
  position: fixed;
  width: 200%;
  height: 200px;
  background: rgba(255,255,255,0.3);
  bottom: 0;
  left: -50%;
  border-radius: 40%;
  animation: waveMove 12s linear infinite;
}

@keyframes waveMove {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.container {
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.7);
  width: 95%;
  max-width: 650px;
  margin: 60px auto;
  border-radius: 22px;
  box-shadow: 0 30px 80px rgba(0,40,80,0.2);
  padding: 30px;
  display: flex;
  flex-direction: column;
  height: 80vh;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  color: #123c5a;
  margin-bottom: 4px;
}

.subtitle {
  text-align: center;
  color: #457b9d;
  margin-bottom: 18px;
  font-size: 14px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  margin: 8px 0;
  padding: 14px 18px;
  border-radius: 18px;
  max-width: 80%;
  line-height: 1.5;
  font-size: 14px;
  opacity: 0;
  animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.user {
  background: #a8dadc;
  align-self: flex-end;
}

.bot {
  background: #f1f8fc;
  border: 1px solid #d6e9f5;
  align-self: flex-start;
}

.typing {
  font-size: 13px;
  color: #457b9d;
  margin: 5px 0;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #d6e9f5;
  font-size: 14px;
  outline: none;
}

button {
  background: #123c5a;
  color: white;
  border: none;
  padding: 14px 20px;
  border-radius: 12px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="wave"></div>

<div class="container">
  <h1>Sabrina & Matthew</h1>
  <div class="subtitle">Wedding Concierge</div>
  <div id="chat"></div>
  <div class="input-row">
    <input id="input" placeholder="Ask about the wedding..." 
onkeydown="if(event.key === 'Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const chat = document.getElementById("chat");

function addMessage(text, className) {
  const div = document.createElement("div");
  div.className = "msg " + className;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  div.textContent = "Concierge is typing...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

function confetti() {
  for (let i = 0; i < 40; i++) {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.width = "8px";
    c.style.height = "8px";
    c.style.background = "#457b9d";
    c.style.top = Math.random()*100 + "vh";
    c.style.left = Math.random()*100 + "vw";
    c.style.borderRadius = "50%";
    c.style.opacity = 0.7;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2000);
  }
}

addMessage("Welcome to Sabrina & Matthew’s Wedding Concierge 💙 Ask me 
anything about the weekend!", "bot");

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  showTyping();

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  removeTyping();
  addMessage(data.reply, "bot");

  if (message.toLowerCase().includes("dance")) {
    confetti();
  }
}

</script>

</body>
</html>
