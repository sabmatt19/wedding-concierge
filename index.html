<!DOCTYPE html>
<html>
<head>
<title>Sabrina & Matthew | Wedding Concierge</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link 
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@400;500&display=swap" 
rel="stylesheet">
<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #eef6fb, #dfeef7);
  font-family: 'Inter', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: white;
  width: 95%;
  max-width: 650px;
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0, 40, 80, 0.15);
  padding: 30px;
  display: flex;
  flex-direction: column;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  margin-bottom: 4px;
  font-size: 28px;
  color: #1d3557;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #457b9d;
  margin-bottom: 22px;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
}

.msg {
  margin: 8px 0;
  padding: 14px 18px;
  border-radius: 18px;
  max-width: 80%;
  line-height: 1.5;
  font-size: 14px;
}

.user {
  background: #a8dadc;
  align-self: flex-end;
  color: #0b3c49;
}

.bot {
  background: #f1f8fc;
  border: 1px solid #d6e9f5;
  align-self: flex-start;
  color: #1d3557;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #d6e9f5;
  font-size: 14px;
  outline: none;
}

input:focus {
  border-color: #457b9d;
}

button {
  background: #1d3557;
  border: none;
  color: white;
  padding: 14px 20px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.2s ease;
}

button:hover {
  background: #16324f;
}
</style>
</head>
<body>
<div class="container">
  <h1>Sabrina & Matthew</h1>
  <div class="subtitle">Wedding Concierge</div>
  <div id="chat"></div>
  <div class="input-row">
    <input id="input" placeholder="Ask about the wedding..." 
onkeydown="if(event.key === 'Enter') send()" />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const message = input.value.trim();
  if (!message) return;

  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.textContent = message;
  chat.appendChild(userMsg);

  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.textContent = data.reply;
  chat.appendChild(botMsg);

  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
