<!DOCTYPE html>
<html>
<head>
<title>Wedding Concierge</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; 
}
#chat { border: 1px solid #ddd; padding: 10px; height: 400px; overflow-y: 
auto; }
.msg { margin: 8px 0; }
.user { font-weight: bold; }
button { padding: 10px; margin-top: 10px; }
</style>
</head>
<body>
<h2>💍 Wedding Concierge</h2>
<div id="chat"></div>
<input id="input" placeholder="Ask a question..." style="width: 100%; 
padding: 8px;" />
<button onclick="send()">Send</button>
<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const message = input.value;
  if (!message) return;

  chat.innerHTML += `<div class="msg user">You: ${message}</div>`;
  input.value = "";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  chat.innerHTML += `<div class="msg">Concierge: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
